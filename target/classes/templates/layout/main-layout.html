<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">OrderSeatCF</title>
    
    <!-- CSRF Token for Fetch API / AJAX requests -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for layout icons if needed -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .btn-premium {
            background-color: #d4a373;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }
        .btn-premium:hover {
            background-color: #bc8a5f;
            transform: scale(1.05);
            color: white;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 1rem 3rem rgba(0,0,0,.175)!important;
        }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: -1px;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Header / Navbar Fragment -->
    <div th:replace="~{fragments/header :: navbar}"></div>

    <!-- Main Content -->
    <main class="container py-4">
        <!-- Nơi các trang con sẽ chèn nội dung vào đây -->
        <div layout:fragment="content"></div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
