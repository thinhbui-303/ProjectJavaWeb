<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Admin Panel">OrderSeatCF Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .admin-sidebar {
            min-height: 100vh;
            background-color: #343a40;
            color: #fff;
            position: sticky;
            top: 0;
        }
        .admin-sidebar .nav-link {
            color: rgba(255, 255, 255, .8);
            margin-bottom: 0.5rem;
        }
        .admin-sidebar .nav-link:hover, .admin-sidebar .nav-link.active {
            color: #fff;
            background-color: #495057;
            border-radius: 0.25rem;
        }
        .admin-sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #4f5962;
            text-align: center;
        }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid flex-grow-1">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block admin-sidebar collapse">
            <div class="position-sticky pt-3">
                <div class="admin-sidebar-header mb-4">
                    <h4 class="fw-bold"><i class="fa-solid fa-mug-hot text-warning"></i> Admin Panel</h4>
                    <p class="small text-muted mb-0">Xin chào, <span sec:authentication="name">Admin</span></p>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/dashboard}">
                            <i class="fa-solid fa-gauge me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/products}">
                            <i class="fa-solid fa-box-open me-2"></i> Quản lý Sản phẩm
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/categories}">
                            <i class="fa-solid fa-list me-2"></i> Quản lý Danh mục
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/reservations}">
                            <i class="fa-solid fa-calendar-check me-2"></i> Quản lý Đơn đặt
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/tables}">
                            <i class="fa-solid fa-chair me-2"></i> Quản lý Bàn
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="fa-solid fa-users me-2"></i> Quản lý Người dùng
                        </a>
                    </li>
                </ul>

                <hr class="border-secondary my-4">
                
                <ul class="nav flex-column mb-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/menu}">
                            <i class="fa-solid fa-store me-2"></i> Về cửa hàng
                        </a>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline w-100">
                            <button type="submit" class="nav-link btn btn-link text-start text-danger w-100"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div layout:fragment="content">
                <!-- Nơi các trang content của admin sẽ chèn vào -->
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
