<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Giỏ Hàng - OrderSeatCF</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="fw-bold text-primary mb-4">Giỏ Hàng Của Bạn</h2>

        <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
            <i class="fa-solid fa-cart-shopping fs-1 text-muted mb-3"></i>
            <h4 class="text-secondary">Giỏ hàng đang trống</h4>
            <p class="text-muted">Hãy chọn thêm vài món đồ uống ngon nhé!</p>
            <a th:href="@{/menu}" class="btn btn-primary mt-2">Đến Thực Đơn</a>
        </div>

        <div th:if="${not #lists.isEmpty(cartItems)}" class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="ps-4">Sản Phẩm</th>
                                        <th scope="col" class="text-center">Số Lượng</th>
                                        <th scope="col" class="text-end">Đơn Giá</th>
                                        <th scope="col" class="text-end pe-4">Thành Tiền</th>
                                        <th scope="col"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${cartItems}">
                                        <td class="ps-4 fw-bold" th:text="${item.name}">Tên đồ uống</td>
                                        <td style="width: 150px;">
                                            <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center justify-content-center">
                                                <input type="hidden" name="productId" th:value="${item.productId}">
                                                <input type="number" name="quantity" class="form-control form-control-sm text-center w-50" th:value="${item.quantity}" min="1">
                                                <button type="submit" class="btn btn-sm btn-outline-secondary ms-1" title="Cập nhật"><i class="fa-solid fa-arrows-rotate"></i></button>
                                            </form>
                                        </td>
                                        <td class="text-end" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                        <td class="text-end pe-4 text-danger fw-bold" th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                        <td class="text-center">
                                            <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="text-danger" title="Xóa món này"><i class="fa-solid fa-trash-can"></i></a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="mt-3">
                    <a th:href="@{/menu}" class="text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Tiếp tục chọn món</a>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm border-0 bg-light">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-4">Tổng Cộng</h4>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Tạm tính:</span>
                            <span class="fw-semibold" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="text-muted">Phí dịch vụ:</span>
                            <span class="fw-semibold">0 đ</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fs-5 fw-bold">Tổng thanh toán:</span>
                            <span class="fs-4 text-danger fw-bold" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                        </div>
                        
                        <!-- Nút này submit đến /cart/checkout. Nếu chưa đăng nhập, user sẽ bị đá sang /login do SecurityConfig -->
                        <div class="d-grid">
                            <a th:href="@{/cart/checkout}" class="btn btn-primary btn-lg fw-bold">Thanh Toán / Đặt Bàn</a>
                        </div>
                        <div class="text-center mt-2 small text-muted">
                            <i class="fa-solid fa-lock me-1"></i> Yêu cầu đăng nhập để thanh toán
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
