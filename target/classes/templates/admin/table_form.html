<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">
<head>
    <title>Thông Tin Bàn - Admin</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 text-gray-800" th:text="${coffeeTable.id == null ? 'Thêm Bàn Mới' : 'Cập Nhật Thông Tin Bàn'}">Thêm Bàn Mới</h2>
            <a th:href="@{/admin/tables}" class="btn btn-secondary shadow-sm">
                <i class="fas fa-arrow-left fa-sm text-white-50"></i> Quay Lại
            </a>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Thông Tin Chi Tiết</h6>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/tables/save}" method="post" th:object="${coffeeTable}">
                    <!-- Trường ẩn lưu ID nếu là cập nhật -->
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label for="name" class="form-label">Tên Bàn <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" th:field="*{name}" required placeholder="VD: Bàn 1, VIP 1...">
                    </div>

                    <div class="mb-3">
                        <label for="capacity" class="form-label">Sức Chứa (Người) <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="capacity" th:field="*{capacity}" required min="1" placeholder="VD: 4">
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Trạng Thái <span class="text-danger">*</span></label>
                        <select class="form-select" id="status" th:field="*{status}" required>
                            <option value="AVAILABLE">Rảnh (Available)</option>
                            <option value="OCCUPIED">Đang có khách (Occupied)</option>
                            <option value="MAINTENANCE">Bảo trì (Maintenance)</option>
                        </select>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Lưu Thông Tin
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
