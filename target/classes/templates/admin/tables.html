<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">
<head>
    <title>Quản Lý Bàn - Admin</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 text-gray-800">Quản Lý Bàn</h2>
            <a th:href="@{/admin/tables/add}" class="btn btn-primary shadow-sm">
                <i class="fas fa-plus fa-sm text-white-50"></i> Thêm Bàn Mới
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Danh Sách Bàn</h6>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover" width="100%" cellspacing="0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên Bàn</th>
                                <th>Sức Chứa (Người)</th>
                                <th>Trạng Thái</th>
                                <th class="text-center">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="table : ${tables}">
                                <td th:text="${table.id}">1</td>
                                <td th:text="${table.name}">Bàn 1</td>
                                <td th:text="${table.capacity}">4</td>
                                <td>
                                    <!-- Dropdown thay đổi trạng thái nhanh -->
                                    <div class="dropdown">
                                        <button class="btn btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false"
                                                th:classappend="${table.status.name() == 'AVAILABLE'} ? 'btn-success' : (${table.status.name() == 'OCCUPIED'} ? 'btn-warning' : 'btn-secondary')">
                                            <span th:if="${table.status.name() == 'AVAILABLE'}">Rảnh</span>
                                            <span th:if="${table.status.name() == 'OCCUPIED'}">Đang có khách</span>
                                            <span th:if="${table.status.name() == 'MAINTENANCE'}">Bảo trì</span>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" th:href="@{/admin/tables/status/{id}?status=AVAILABLE(id=${table.id})}">Rảnh (Available)</a></li>
                                            <li><a class="dropdown-item" th:href="@{/admin/tables/status/{id}?status=OCCUPIED(id=${table.id})}">Đang có khách (Occupied)</a></li>
                                            <li><a class="dropdown-item" th:href="@{/admin/tables/status/{id}?status=MAINTENANCE(id=${table.id})}">Bảo trì (Maintenance)</a></li>
                                        </ul>
                                    </div>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/admin/tables/edit/{id}(id=${table.id})}" class="btn btn-sm btn-info text-white">
                                        <i class="fas fa-edit"></i> Sửa
                                    </a>
                                    <a th:href="@{/admin/tables/delete/{id}(id=${table.id})}" 
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa bàn này?');">
                                        <i class="fas fa-trash"></i> Xóa
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(tables)}">
                                <td colspan="5" class="text-center text-muted">Chưa có dữ liệu bàn.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
