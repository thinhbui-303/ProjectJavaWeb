<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">
<head>
    <title>Quản lý Danh Mục</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
            <h1 class="h2">Quản Lý Danh Mục</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <a th:href="@{/admin/categories/add}" class="btn btn-sm btn-primary">
                    <i class="fa-solid fa-plus mt-1"></i> Thêm Danh Mục Mới
                </a>
            </div>
        </div>

        <div th:if="${param.success}" class="alert alert-success">Danh mục đã được lưu thành công!</div>
        <div th:if="${param.deleted}" class="alert alert-success">Đã xóa danh mục thành công!</div>
        <div th:if="${param.error}" class="alert alert-danger">Không thể xóa danh mục này vì đang có sản phẩm thuộc danh mục!</div>

        <div class="table-responsive bg-white rounded shadow-sm">
            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col" style="width: 80px;">#</th>
                        <th scope="col">Tên Danh Mục</th>
                        <th scope="col">Danh Mục Cha</th>
                        <th scope="col">Mô Tả</th>
                        <th scope="col" class="text-center" style="width: 200px;">Hành Động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categories}">
                        <td class="fw-bold" th:text="${cat.id}"></td>
                        <td class="fw-bold text-primary" th:text="${cat.name}"></td>
                        <td>
                            <span th:if="${cat.parent != null}" class="badge bg-secondary" th:text="${cat.parent.name}">Danh mục cha</span>
                            <span th:if="${cat.parent == null}" class="badge bg-success">Danh mục gốc</span>
                        </td>
                        <td th:text="${cat.description}"></td>
                        <td class="text-center">
                            <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}" class="btn btn-sm btn-warning mb-1">
                                <i class="fa-solid fa-pen-to-square"></i> Sửa
                            </a>
                            <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" 
                               class="btn btn-sm btn-danger mb-1" 
                               onclick="return confirm('Xác nhận xóa danh mục này?');">
                                <i class="fa-solid fa-trash"></i> Xóa
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="4" class="text-center text-muted py-4">Chưa có danh mục nào trong hệ thống.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
