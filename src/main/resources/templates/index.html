<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderSeat - Chốn Riêng Của Tín Đồ Cà Phê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('/images/hero_coffee.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }
        .btn-premium {
            background-color: #d4a373;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }
        .btn-premium:hover {
            background-color: #bc8a5f;
            transform: scale(1.05);
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent position-absolute w-100" style="z-index: 10;">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">OrderSeat<span class="text-warning">CF</span></a>
            <div class="ms-auto d-flex align-items-center">
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-light rounded-pill me-2">Đăng Nhập</a>
                    <a th:href="@{/register}" class="btn btn-warning rounded-pill">Đăng Ký</a>
                </div>
                <div sec:authorize="isAuthenticated()" class="dropdown text-end">
                    <a href="#" class="d-block link-light text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fa-solid fa-circle-user fs-4"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end text-small shadow">
                        <li><a class="dropdown-item" th:href="@{/customer/profile}">Hồ sơ</a></li>
                        <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin/dashboard}">Quản trị</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item">Đăng xuất</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-1 fw-bold mb-3">OrderSeat <span style="color: #d4a373;">Coffee</span></h1>
            <p class="lead fs-3 mb-5">Nơi những hạt cà phê thượng hạng kể về câu chuyện của riêng bạn.</p>
            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/menu}" class="btn btn-premium fs-5">Xem Thực Đơn</a>
                <a th:href="@{/customer/booking}" class="btn btn-outline-light btn-lg rounded-pill px-5">Đặt Bàn Ngay</a>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
