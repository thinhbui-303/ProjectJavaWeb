<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">
<head>
    <title>Quản lý Sản Phẩm</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
            <h1 class="h2">Quản Lý Sản Phẩm</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <a th:href="@{/admin/products/add}" class="btn btn-sm btn-primary">
                    <i class="fa-solid fa-plus mt-1"></i> Thêm Sản Phẩm Mới
                </a>
            </div>
        </div>

        <div th:if="${param.success}" class="alert alert-success">Sản phẩm đã được lưu cập nhật thành công!</div>
        <div th:if="${param.deleted}" class="alert alert-success">Đã xóa sản phẩm thành công!</div>

        <div class="table-responsive bg-white rounded shadow-sm">
            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Ảnh</th>
                        <th scope="col">Tên Sản Phẩm</th>
                        <th scope="col">Danh mục</th>
                        <th scope="col">Giá (VND)</th>
                        <th scope="col" class="text-center">Hành Động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td class="fw-bold" th:text="${p.id}"></td>
                        <td>
                            <img th:src="${p.imageUrl ?: '/images/placeholder.png'}" alt="Preview" style="width: 50px; height: 50px; object-fit: cover;" class="rounded border">
                        </td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.category.name}"></td>
                        <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></td>
                        <td class="text-center">
                            <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning mb-1">
                                <i class="fa-solid fa-pen-to-square"></i> Sửa
                            </a>
                            
                            <!-- Nút xóa dùng form POST mô phỏng DELETE -->
                            <form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="get" class="d-inline">
                                <!-- Với GET bình thường có thể dùng a href, nhưng nếu muốn đổi thành POST DELETE có thể dùng method="POST" và hidden method="DELETE". Hiện tại controller đang map GetMapping -->
                                <button type="submit" class="btn btn-sm btn-danger mb-1" onclick="return confirm('Xác nhận xóa sản phẩm này?');">
                                    <i class="fa-solid fa-trash"></i> Xóa
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="text-center text-muted py-4">Chưa có sản phẩm nào trong hệ thống.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
