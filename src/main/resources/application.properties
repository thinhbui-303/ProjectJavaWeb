spring.application.name=orderseat-cf

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/orderseat_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Server Port
server.port=8080

# File Upload Configuration
app.upload.dir=src/main/resources/static/images/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
